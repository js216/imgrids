[target.armv7-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"
rustflags = ["-C", "target-feature=+crt-static"]

[target.wasm32-unknown-emscripten]
rustflags = ["-C", "link-args=-sSINGLE_FILE -sALLOW_MEMORY_GROWTH=1 --embed-file fonts --js-library=src/web.js"]

[alias]
build-sdl  = "build --release --example demo --features sdl,bpp16"
build-fb32 = "build --release --example demo --features fb0,bpp32"
build-fb16 = "build --release --example demo --features fb0,bpp16 --target armv7-unknown-linux-gnueabihf"
build-web  = "build --release --example demo --features web,bpp32rgba --target wasm32-unknown-emscripten"
check-all  = "clippy --features sdl,bpp16 --example demo -- -D warnings"
